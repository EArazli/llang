name:                llang
version:             0.1.0.0
github:              "githubuser/llang"
license:             BSD-3-Clause
author:              "Author name here"
maintainer:          "example@example.com"
copyright:           "2026 Author name here"

extra-source-files:
- README.md
- CHANGELOG.md
- examples/README.md
data-files:
- examples/build/hello_doc.llang
- examples/build/bundle_docs.llang
- examples/build/logic_full_adder_codegen.llang
- examples/build/explicit_sharing_js_codegen.llang
- examples/build/autodiff_times_sin.llang
- examples/build/autodiff_times_sin_pair_core.llang
- examples/lib/dependent/vec.llang
- examples/lib/algebra/box_match.llang
- examples/lib/algebra/cart_monoid.llang
- examples/lib/algebra/cat.llang
- examples/lib/algebra/ccc.llang
- examples/lib/algebra/coherence_demo.llang
- examples/lib/algebra/loop_demo.llang
- examples/lib/algebra/monoid_to_string.llang
- examples/lib/algebra/peano.llang
- examples/lib/algebra/planar_monoid.llang
- examples/lib/algebra/ski.llang
- examples/lib/algebra/subdiagram_match.llang
- examples/lib/codegen/minifun/console.llang
- examples/lib/codegen/minifun/minifun.surface.llang
- examples/lib/effects/combined.llang
- examples/lib/modes/dual_discipline_surface.llang
- examples/lib/modes/dual_discipline_term_surface.llang
- examples/lib/modes/quad_discipline.llang
- examples/lib/modes/staging_mode_map.llang
- examples/lib/modes/struct_caps.llang
- examples/lib/pushout/category_bool_nat_base.llang
- examples/lib/pushout/comm_monoid.llang
- examples/lib/pushout/nat_bool.llang
- examples/lib/pushout/nat_bool_plus.llang
- examples/lib/pushout/pushout_basic.llang
- examples/lib/pushout/pushout_extend.llang
- examples/lib/surfaces/ccc_surface/ccc.llang
- examples/lib/surfaces/planar_monoid.ssa.surface.llang
- examples/lib/templates/state.template.llang
- stdlib/bool.llang
- stdlib/data/list.llang
- stdlib/effects/exception.template.llang
- stdlib/effects/nondet.llang
- stdlib/effects/writer.template.llang
- stdlib/nat.llang
- stdlib/schema.adjunction.llang
- stdlib/schema.monad.llang
- stdlib/struct.cartesian.llang
- stdlib/struct.planar.llang
- stdlib/struct.symmetric.llang
# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/githubuser/llang#readme>

dependencies:
- base >= 4.7 && < 5
- bytestring
- containers
- directory
- filepath
- megaparsec
- mtl
- parser-combinators
- text

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src
  dependencies:
  - template-haskell
  other-modules:
  - Strat.Frontend.CompilerFingerprint
  - Strat.Common.Provider
  - Strat.Poly.BeckChevalleyObligations
  - Strat.Frontend.Compile
  - Strat.Poly.TeleArgs
  - Strat.Poly.CompObligations
  - Strat.Poly.Kernel
  - Strat.Poly.ModeSyntax
  - Strat.Poly.ObjResolve
  - Strat.Poly.Term.Confluence
  - Strat.Poly.Term.Termination
  - Strat.Poly.Traversal
  - Strat.Poly.ObjPretty
  - Strat.Util.Fingerprint
  - Strat.Util.List

executables:
  llang-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - llang

tests:
  llang-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - llang
    - tasty
    - tasty-hunit
    - QuickCheck
    - tasty-quickcheck
    other-modules:
    - Test.Poly.Canon
    - Test.Poly.Basic
    - Test.Poly.DiagramUnion
    - Test.Poly.Rewrite
    - Test.Poly.CriticalPairs
    - Test.Poly.Morphism
    - Test.Poly.Pushout
    - Test.Poly.CCC
    - Test.Poly.Coherence
    - Test.Poly.DataMacro
    - Test.Poly.Dependent
    - Test.Poly.NBE
    - Test.Poly.Helpers
    - Test.Poly.CtorSigCompat
    - Test.Poly.Quote
    - Test.Poly.Acyclic
    - Test.Poly.Feedback
    - Test.Poly.ModeTheory
    - Test.Poly.ModeTransforms
    - Test.Poly.Surface
    - Test.Poly.TermNormalize
    - Test.Poly.UnifyObj
    - Test.Poly.ObjModes
    - Test.Poly.ClassificationResolution
    - Test.Poly.Slots
    - Test.DSL.Functors
    - Test.Host.Backend
    - Test.Frontend.Loader
    - Test.Value.Doc
    - Test.Frontend.Pipeline
    - Test.Frontend.Builds
    - Test.Frontend.ExampleCodegen
    - Test.Frontend.CanonicalCoverage
    - Test.Frontend.ExamplesSmoke
    - Test.Frontend.StdlibIntegration
    - Paths_llang
